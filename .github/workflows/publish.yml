name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'          # Trigger on tags like v0.1.0, v1.2.3, etc.

jobs:
  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment: pypi          # Must match the name you set on PyPI Trusted Publisher
    permissions:
      id-token: write          # Required for Trusted Publishing (OIDC token)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # Optional: needed if you use git tags/versions in build

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true   # Cache uv & python for faster runs

      - name: Set up Python
        run: uv python install 3.13  # Or your required version(s)

      - name: Install project dependencies
        run: uv sync --all-groups --frozen  # Installs build deps too

      - name: Build package (sdist + wheel)
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        # No --token needed — Trusted Publishing uses OIDC id-token automatically